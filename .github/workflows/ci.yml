name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build C dependencies
        run: make deps

      - name: Run tests
        run: swift test

      - name: Build app
        run: make build