name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Build C dependencies
        run: make deps

      # The package needs the Swift 6 toolchain; macos-14 defaults to Xcode 15
      # (Swift 5.10). Select Xcode 16 here — after the C deps build so that keeps
      # using the runner default toolchain it already builds cleanly with.
      - name: Select Swift 6 toolchain
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "No Xcode 16.x found; available Xcodes:"; ls -d /Applications/Xcode_*.app
            exit 1
          fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC"
          swift --version

      # Use `make test`, not bare `swift test`: the Makefile exports
      # PKG_CONFIG_PATH=third_party/prefix/lib/pkgconfig, which SpiceShim's
      # pkgConfig("spice-client-glib-2.0") needs to find <spice-client.h>.
      - name: Run tests
        run: make test

      - name: Build app
        run: make build